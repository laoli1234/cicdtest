apiVersion: apps/v1
kind: Deployment
metadata:
  name: github-app  # 自定义应用名
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: github-app
  template:
    metadata:
      labels:
        app: github-app
    spec:
      containers:
        - name: github-app
          # 替换为你的ACR镜像地址，${BUILD_NUMBER}是Jenkins构建号
          image: registry-vpc.cn-hangzhou.aliyuncs.com/laoli_k8s/my-app:APP_VERSION
          ports:
            - containerPort: 8080  # 替换为你的应用端口
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 200m
              memory: 256Mi
---
# 暴露服务（NodePort方式，外网可访问）
apiVersion: v1
kind: Service
metadata:
  name: github-app-service
  namespace: default
spec:
  type: NodePort
  selector:
    app: github-app
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080  # 端口范围30000-32767